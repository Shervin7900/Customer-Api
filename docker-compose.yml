services:
  customerapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: customer-api
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CustomerApiDb;User Id=sa;Password=Password123!;TrustServerCertificate=True
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - customer-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: customer-sql
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password123!
    ports:
      - "1434:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Password123!", "-Q", "SELECT 1", "-C"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - customer-network

networks:
  customer-network:
    driver: bridge
